name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README'
      - 'COPYRIGHT'
      - 'LICENSE'
      - '**.md'
      - '**.txt'
  pull_request:
    paths-ignore:
      - 'README'
      - 'COPYRIGHT'
      - 'LICENSE'
      - '**.md'
      - '**.txt'
  workflow_dispatch:
  schedule: 
    - cron: "0 1 1 * *"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  RUST_BACKTRACE: 1

jobs:
  # Check formatting (platform-independent, one OS is enough)
  rustfmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Install Rust
      # rustfmt.toml uses nightly-only options (imports_granularity), so the
      # format check runs under nightly. Pin a dated nightly so the gate is
      # reproducible: an unpinned `nightly` could change rustfmt's behavior
      # (new import churn) or temporarily ship without the rustfmt component,
      # failing a PR with no repo change. Bump this date deliberately and
      # re-run `cargo +nightly-<date> fmt --all` when you do.
      run: rustup toolchain install nightly-2026-06-10 --component rustfmt && rustup default nightly-2026-06-10
    - name: Check formatting
      run: cargo fmt --all -- --check

  # Apply clippy lints
  clippy:
    name: clippy
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v7
    - name: Install Rust
      # --no-self-update is necessary because the windows environment cannot self-update rustup.exe.
      run: rustup update stable --no-self-update && rustup default stable && rustup component add clippy
    - name: Install cargo-hack
      run: cargo install cargo-hack
    - name: Apply clippy lints
      run: cargo hack clippy --feature-powerset --group-features yuv-planar,yuv-semi-planar,yuva,yuv-packed,yuv-444-packed,y2xx,v210,rgb,rgb-float,rgb-legacy,gbr,gray,bayer,xyz,mono,frame

  # Run tests on some extra platforms
  cross:
    name: cross
    strategy:
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - aarch64-linux-android
          - aarch64-unknown-linux-musl
          - i686-linux-android
          - x86_64-linux-android
          - i686-pc-windows-gnu
          - x86_64-pc-windows-gnu
          - i686-unknown-linux-gnu
          - powerpc64-unknown-linux-gnu
          - riscv64gc-unknown-linux-gnu
          - wasm32-unknown-unknown
          - wasm32-unknown-emscripten
          - wasm32-wasip1
          - wasm32-wasip1-threads
          - wasm32-wasip2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Cache cargo build and registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cross-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cross-
      - name: Install Rust
        run: rustup update stable && rustup default stable
      - name: cargo build --target ${{ matrix.target }}
        run: |
          rustup target add ${{ matrix.target }}
          cargo build --target ${{ matrix.target }}

  build:
    name: build
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v7
    - name: Cache cargo build and registry
      uses: actions/cache@v6
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-build-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-build-
    - name: Install Rust
      # --no-self-update is necessary because the windows environment cannot self-update rustup.exe.
      run: rustup update stable --no-self-update && rustup default stable
    - name: Install cargo-hack
      run: cargo install cargo-hack
    - name: Run build
      run: cargo hack build --feature-powerset --group-features yuv-planar,yuv-semi-planar,yuva,yuv-packed,yuv-444-packed,y2xx,v210,rgb,rgb-float,rgb-legacy,gbr,gray,bayer,xyz,mono,frame

  test:
    name: test
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v7
    - name: Cache cargo build and registry
      uses: actions/cache@v6
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-test-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-test-
    - name: Install Rust
      # --no-self-update is necessary because the windows environment cannot self-update rustup.exe.
      run: rustup update stable --no-self-update && rustup default stable
    - name: Install cargo-hack
      run: cargo install cargo-hack
    - name: Run test
      # An 8 MiB minimum thread stack keeps the test runner's worker threads
      # clear of a stack overflow on the constrained Windows (~1 MiB default)
      # thread stack — a defence-in-depth guard alongside the bounded
      # `MixedSinker` inline size (see `mixed_sinker_inline_size_stays_small`).
      env:
        RUST_MIN_STACK: 8388608
      run: cargo hack test --feature-powerset --group-features yuv-planar,yuv-semi-planar,yuva,yuv-packed,yuv-444-packed,y2xx,v210,rgb,rgb-float,rgb-legacy,gbr,gray,bayer,xyz,mono,frame

  # Run the x86_64 test suite under Intel SDE with Ice Lake (`-icx`)
  # emulation. The standard ubuntu-latest runner is AMD Milan (no
  # native AVX-512), so without SDE the AVX-512 kernel's
  # `is_x86_feature_detected!("avx512bw")` gate returns false and the
  # AVX-512 equivalence tests short-circuit. With SDE, `-icx` reports
  # AVX-512F/BW/DQ/VL/VNNI/BF16 via its CPUID intercept, so every x86
  # kernel (SSE4.1, AVX2, AVX-512) actually executes and compares
  # against the scalar LUT reference.
  #
  # SDE slowdown is ~5-10x, so the lib test suite runs in ~30-60s
  # instead of ~1s — still well within the free-runner budget.
  test-sde:
    name: test-sde-avx512
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Cache cargo build and registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-test-sde-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-test-sde-
      - name: Install Rust
        run: rustup update stable --no-self-update && rustup default stable
      - name: Install Intel SDE
        # v5.0 distributes binaries from this action's own GitHub Releases
        # rather than fetching from Intel's CDN — the latter has been
        # returning HTTP 202 (still-processing) intermittently. `sdeVersion`
        # is intentionally omitted so the action's bundled default (its
        # tested-latest within this major) is used; bump the action major
        # to pick up future SDE bumps. AVX-512F/BW/DQ/VL/VNNI/BF16 under
        # `-icx` is stable across 9.x and 10.x.
        uses: petarpetrovt/setup-sde@v5.0
        with:
          environmentVariableName: SDE_PATH
      - name: Run tests under SDE (-icx, Ice Lake AVX-512)
        # The `petarpetrovt/setup-sde` action exports `SDE_PATH` but
        # does not add the extracted directory to `PATH`, so `sde64`
        # isn't on PATH directly. Resolve the full path via shell
        # expansion before handing it to cargo as the runner.
        #
        # `RUST_MIN_STACK` gives the test worker threads an 8 MiB stack — the
        # SDE thread default is tighter than the 8 MiB main-thread budget, so
        # this guards against a stack overflow (defence-in-depth alongside the
        # bounded `MixedSinker` inline size).
        shell: bash
        env:
          RUST_MIN_STACK: 8388608
        run: |
          export CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUNNER="$SDE_PATH/sde64 -icx --"
          cargo test --all-features

  # Run the wasm32 simd128 lib tests under wasmtime. The `cross` job
  # above only builds for wasm targets; without this job the
  # `wasm_simd128` backend's handcrafted swizzles / clamps / u16
  # stores were dispatchable in production (under
  # `-C target-feature=+simd128`) but never runtime‑verified. This job
  # runs every scalar‑equivalence test — including the new yuv420p10
  # u8 / u16 output paths and the adversarial out‑of‑range regressions
  # — against an actual wasm runtime.
  #
  # `wasm32-wasip1` is the wasi preview‑1 target (libstd + file/env
  # APIs that the test harness needs). Criterion is gated out of the
  # wasm dev‑deps in Cargo.toml because rayon doesn't build for wasi.
  test-wasm-simd128:
    name: test-wasm-simd128
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Cache cargo build and registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-test-wasm-simd128-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-test-wasm-simd128-
      - name: Install Rust + wasm32-wasip1
        run: |
          rustup update stable --no-self-update
          rustup default stable
          rustup target add wasm32-wasip1
      - name: Install wasmtime
        # Pinned to a specific release because the upstream
        # `wasmtime.dev/install.sh` script can break when its
        # version-detection logic fails to substitute the latest tag
        # (e.g. emitting `{` as a literal placeholder), producing an
        # invalid download URL. Direct GitHub release download is more
        # reliable and reproducible.
        run: |
          WASMTIME_VERSION=v44.0.1
          ARCHIVE="wasmtime-${WASMTIME_VERSION}-x86_64-linux"
          curl -sSfL "https://github.com/bytecodealliance/wasmtime/releases/download/${WASMTIME_VERSION}/${ARCHIVE}.tar.xz" \
            | tar -xJ -C "$HOME"
          echo "$HOME/${ARCHIVE}" >> "$GITHUB_PATH"
      - name: Run lib tests under wasmtime (simd128)
        env:
          # `cargo test` hands the compiled `.wasm` test binary as the
          # first positional arg after `--`; wasmtime's `run --`
          # interprets that as the module path. We don't need filesystem
          # or env access — the tests are pure compute.
          CARGO_TARGET_WASM32_WASIP1_RUNNER: wasmtime run --
          RUSTFLAGS: -C target-feature=+simd128
        run: cargo test --lib --target wasm32-wasip1

  sanitizer:
    name: sanitizer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Cache cargo build and registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-sanitizer-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-sanitizer-
      - name: Install Rust
        run: rustup update nightly && rustup default nightly
      - name: Install rust-src
        run: rustup component add rust-src
      - name: ASAN / LSAN / MSAN / TSAN
        run: bash ci/sanitizer.sh

  miri-tb:
    name: miri-tb-${{ matrix.target }}${{ matrix.feature-group && format(' [{0}]', matrix.feature-group) || '' }}
    strategy:
      fail-fast: false
      matrix:
        # Targets that fit the whole default-features suite in one miri process
        # run it unsharded (no feature-group). The two memory/speed-constrained
        # targets — 32-bit i686 (4 GB shared address space) and aarch64-darwin
        # (soft-float interpreter, where the full suite is too slow for the job
        # timeout) — are split across an exhaustive set of disjoint feature
        # groups, each its own container compiling only a subset of the format
        # kernels. The four groups partition every format feature in Cargo.toml
        # (yuva pulls in yuv-planar via its own feature edge, so it is grouped
        # with the planar family).
        #
        # Coverage note: because each sharded container compiles only its own
        # group, code paths gated on features from two different groups (e.g.
        # yuv-planar + rgb) are not exercised under miri on i686/aarch64-darwin.
        # Those cross-feature paths are covered by the five unsharded targets,
        # which build the whole default-features suite in one process; the
        # sharded pair deliberately trades that cross-group coverage for fitting
        # the 4 GB / soft-float interpreter limits.
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-latest
            target: powerpc64-unknown-linux-gnu
          - os: ubuntu-latest
            target: s390x-unknown-linux-gnu
          - os: ubuntu-latest
            target: riscv64gc-unknown-linux-gnu
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
            feature-group: yuv-planar yuv-semi-planar yuva
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
            feature-group: yuv-packed yuv-444-packed y2xx v210
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
            feature-group: rgb rgb-float gbr gray rgb-legacy
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
            feature-group: xyz bayer mono
          - os: macos-latest
            target: aarch64-apple-darwin
            feature-group: yuv-planar yuv-semi-planar yuva
          - os: macos-latest
            target: aarch64-apple-darwin
            feature-group: yuv-packed yuv-444-packed y2xx v210
          - os: macos-latest
            target: aarch64-apple-darwin
            feature-group: rgb rgb-float gbr gray rgb-legacy
          - os: macos-latest
            target: aarch64-apple-darwin
            feature-group: xyz bayer mono
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Cache cargo build and registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-miri-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-miri-
      - name: Miri
        run: |
          bash ci/miri_tb.sh "${{ matrix.target }}" "${{ matrix.feature-group }}"

  miri-sb:
    name: miri-sb-${{ matrix.target }}${{ matrix.feature-group && format(' [{0}]', matrix.feature-group) || '' }}
    strategy:
      fail-fast: false
      matrix:
        # See miri-tb for the sharding rationale: unsharded targets run the
        # whole default-features suite in one process; i686 and aarch64-darwin
        # are split across the same four disjoint, exhaustive feature groups.
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-latest
            target: powerpc64-unknown-linux-gnu
          - os: ubuntu-latest
            target: s390x-unknown-linux-gnu
          - os: ubuntu-latest
            target: riscv64gc-unknown-linux-gnu
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
            feature-group: yuv-planar yuv-semi-planar yuva
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
            feature-group: yuv-packed yuv-444-packed y2xx v210
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
            feature-group: rgb rgb-float gbr gray rgb-legacy
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
            feature-group: xyz bayer mono
          - os: macos-latest
            target: aarch64-apple-darwin
            feature-group: yuv-planar yuv-semi-planar yuva
          - os: macos-latest
            target: aarch64-apple-darwin
            feature-group: yuv-packed yuv-444-packed y2xx v210
          - os: macos-latest
            target: aarch64-apple-darwin
            feature-group: rgb rgb-float gbr gray rgb-legacy
          - os: macos-latest
            target: aarch64-apple-darwin
            feature-group: xyz bayer mono
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Cache cargo build and registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-miri-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-miri-
      - name: Miri
        run: |
          bash ci/miri_sb.sh "${{ matrix.target }}" "${{ matrix.feature-group }}"
