name: loc 

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'COPYRIGHT'
      - 'LICENSE'
      - '**.md'
      - '**.txt'
      - 'art'
  pull_request:
    paths-ignore:
      - 'README.md'
      - 'COPYRIGHT'
      - 'LICENSE'
      - '**.md'
      - '**.txt'
      - 'art'
  workflow_dispatch:

jobs:
  loc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        run: |
          rustup update stable && rustup default stable
          rustup component add clippy
          rustup component add rustfmt
      
      - name: Install tokeit
        run: |
          cargo install tokeit --force
      
      - name: Count total lines of code
        run: |
          tokeit --lang rust
      - name: Upload total loc to GitHub Gist
        # Secret-dependent: GIST_PAT is not exposed to pull_request runs
        # and the badge gist should only track main anyway. Also skip when the
        # secret is unset (forks / repos without the badge gist configured) so
        # the workflow stays green — the count above already ran.
        #
        # GIST_PAT is scoped to THIS step only (step-level `env`), not the job,
        # so it is never exposed to the earlier `cargo install` / build steps.
        # `secrets.*` is not allowed in a step `if:` but step-level `env.*` is,
        # so an unset GIST_PAT skips the upload (which would otherwise hard-fail
        # with "Input required and not supplied: github-token").
        if: github.event_name != 'pull_request' && env.GIST_PAT != ''
        env:
          GIST_PAT: ${{ secrets.GIST_PAT }}
        uses: actions/github-script@v9
        with:
          github-token: ${{ env.GIST_PAT }}
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('tokeit.json', 'utf8');
            const gistId = '327b2a8aef9003246e45c6e47fe63937';
            await github.rest.gists.update({
              gist_id: gistId,
              files: {
                "colconv": {
                  content: output
                }
              }
            });
